<svg width="1200" height="450" viewBox="0 0 1200 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="450" rx="20" fill="#F3F0EA"/>
  <rect x="40" y="40" width="1120" height="390" rx="20" fill="#FFFFFF" stroke="#D9D4CC" stroke-width="2"/>

  <text x="76" y="90" fill="#6A716D" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
