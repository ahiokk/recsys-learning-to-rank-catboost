  </text>

  <rect x="645" y="188" width="465" height="68" rx="12" fill="#FFFFFF" stroke="#D9D4CC" stroke-width="2"/>
  <text x="663" y="212" fill="#2E3531" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    2. Генерация кандидатов
  </text>
  <text x="663" y="234" fill="#2E3531" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400">
