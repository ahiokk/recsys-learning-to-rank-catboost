  </text>
  <text x="76" y="374" fill="#4F5A55" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400">
    Telegram: @ah1ok
  </text>
  <text x="76" y="396" fill="#4F5A55" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400">
    Email: irakli1408@yandex.ru
  </text>
  <text x="76" y="418" fill="#4F5A55" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400">
