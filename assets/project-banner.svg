  </text>

  <rect x="645" y="344" width="465" height="68" rx="12" fill="#FFFFFF" stroke="#D9D4CC" stroke-width="2"/>
  <text x="663" y="368" fill="#2E3531" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
