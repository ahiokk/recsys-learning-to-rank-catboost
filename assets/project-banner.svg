  </text>

  <line x1="615" y1="76" x2="615" y2="410" stroke="#E3DED6" stroke-width="2"/>

  <text x="645" y="98" fill="#202522" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Pipeline
  </text>

  <rect x="645" y="110" width="465" height="68" rx="12" fill="#FFFFFF" stroke="#D9D4CC" stroke-width="2"/>
  <text x="663" y="134" fill="#2E3531" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    1. Подготовка данных
  </text>
  <text x="663" y="156" fill="#2E3531" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="400">
