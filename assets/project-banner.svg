  </text>

  <text x="76" y="138" fill="#202522" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">
    Learning-to-Rank с CatBoost
  </text>
  <text x="76" y="176" fill="#202522" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">
